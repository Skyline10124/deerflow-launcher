name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ''
            archive: 'tar.gz'
          - os: windows-latest
            platform: win
            ext: '.exe'
            archive: 'zip'
          - os: macos-latest
            platform: macos
            ext: ''
            archive: 'tar.gz'

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_time: ${{ steps.version.outputs.build_time }}
      release_date: ${{ steps.version.outputs.release_date }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build executable
        run: npx @yao-pkg/pkg . --targets node22-${{ matrix.platform }}-x64 --output "dist/pkg/deerflow-launcher${{ matrix.ext }}"
        env:
          PKG_CACHE_PATH: ${{ github.workspace }}/pkg-cache

      - name: Get version and build time
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_TIME=$(date +%Y%m%d_%H%M)
          RELEASE_DATE=$(date +%Y-%m-%d)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT

      - name: Prepare release directory
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_TIME="${{ steps.version.outputs.build_time }}"
          RELEASE_DIR="dist/release/deerflow-launcher_${VERSION}_${{ matrix.platform }}-x64"
          
          mkdir -p "$RELEASE_DIR/assets"
          cp "dist/pkg/deerflow-launcher${{ matrix.ext }}" "$RELEASE_DIR/"
          cp scripts/wrapper.js "$RELEASE_DIR/assets/"
          
          cat > "$RELEASE_DIR/README.txt" << EOF
          DeerFlow Launcher v${VERSION}
          ========================
          
          This is the DeerFlow Launcher for ${{ matrix.platform }}.
          
          Usage:
            ./deerflow-launcher${{ matrix.ext }} --help
          
          Commands:
            deerflow-launcher start [services...]    Start services
            deerflow-launcher stop [services...]     Stop services
            deerflow-launcher status [service]       Show service status
            deerflow-launcher logs [service]         View service logs
            deerflow-launcher doctor                 Run environment diagnostics
            deerflow-launcher config <command>       Manage configuration
          
          Requirements:
            - Python 3.12+
            - Node.js 22+
            - uv (Python package manager)
            - pnpm (Node.js package manager)
            - nginx
          
          License: MIT
          EOF

      - name: Create archive (Windows)
        if: ${{ matrix.platform == 'win' }}
        working-directory: dist/release
        shell: pwsh
        run: Compress-Archive -Path "deerflow-launcher_${{ steps.version.outputs.version }}_${{ matrix.platform }}-x64" -DestinationPath "deerflow-launcher_${{ steps.version.outputs.version }}_${{ matrix.platform }}-x64_${{ steps.version.outputs.build_time }}.zip"

      - name: Create archive (Unix)
        if: ${{ matrix.platform != 'win' }}
        working-directory: dist/release
        run: tar -czvf "deerflow-launcher_${{ steps.version.outputs.version }}_${{ matrix.platform }}-x64_${{ steps.version.outputs.build_time }}.tar.gz" "deerflow-launcher_${{ steps.version.outputs.version }}_${{ matrix.platform }}-x64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deerflow-launcher-${{ matrix.platform }}-x64
          path: |
            dist/release/deerflow-launcher_${{ steps.version.outputs.version }}_${{ matrix.platform }}-x64_${{ steps.version.outputs.build_time }}.*
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          CHANGELOG=$(awk -v ver="## \\[${VERSION}\\]" '
            $0 ~ ver {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md)
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeerFlow Launcher v${{ steps.version.outputs.version }} ${{ needs.build.outputs.release_date }}
          body: |
            ## 更新日志
            
            ${{ steps.changelog.outputs.changelog }}
            
            ---
            
            ## 下载
            
            - **Windows**: `deerflow-launcher_*_win-x64_*.zip`
            - **Linux**: `deerflow-launcher_*_linux-x64_*.tar.gz`
            - **macOS**: `deerflow-launcher_*_macos-x64_*.tar.gz`
            
            ## 系统要求
            
            - Python 3.12+
            - Node.js 22+
            - uv (Python 包管理器)
            - pnpm (Node.js 包管理器)
            - nginx
            
            ## 使用方法
            
            ```bash
            # 解压压缩包
            tar -xzf deerflow-launcher_*.tar.gz  # Linux/macOS
            # 或 unzip deerflow-launcher_*.zip   # Windows
            
            # 运行启动器
            ./deerflow-launcher --help
            ```
          files: |
            artifacts/**/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
