name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.5.0)'
        required: false
        default: ''

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            ext: .exe
            platform: win
          - os: ubuntu-latest
            target: bun-linux-x64
            ext: ''
            platform: linux
          - os: macos-latest
            target: bun-darwin-x64
            ext: ''
            platform: macos
          - os: macos-latest
            target: bun-darwin-arm64
            ext: ''
            platform: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build executable
        run: |
          bun build --compile --target=${{ matrix.target }} ./src/cli.ts --outfile dist/deerflow-launcher${{ matrix.ext }}

      - name: Create README
        shell: bash
        run: |
          mkdir -p dist/release
          cat > dist/release/README.txt << 'EOF'
          DeerFlow Launcher (Bun-powered)
          ===============================

          This is the DeerFlow Launcher for ${{ matrix.platform }}.

          Usage:
            ./deerflow-launcher${{ matrix.ext }} --help

          Commands:
            deerflow-launcher start [services...]    Start services
            deerflow-launcher stop [services...]     Stop services
            deerflow-launcher status [service]       Show service status
            deerflow-launcher logs [service]         View service logs
            deerflow-launcher doctor                 Run environment diagnostics
            deerflow-launcher config <command>       Manage configuration

          Requirements:
            - Python 3.12+
            - uv (Python package manager)
            - pnpm (Node.js package manager)
            - nginx

          License: MIT
          EOF

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist/deerflow-launcher${{ matrix.ext }}, dist/release/README.txt -DestinationPath dist/deerflow-launcher-${{ matrix.platform }}-x64.zip

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          tar -czvf deerflow-launcher-${{ matrix.platform }}-x64.tar.gz deerflow-launcher${{ matrix.ext }} release/README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deerflow-launcher-${{ matrix.platform }}-x64
          path: |
            dist/deerflow-launcher-${{ matrix.platform }}-x64.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
